<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
</head>
<body>
    <h1>Art Gallery</h1>
    <a href="/upload">Upload New</a>

    <hr>

    <div th:each="art : ${artworks}">
        <h3 th:text="${art.title}"></h3>

        <img th:src="@{'/image/' + ${art.id}}" width="250">
    </div>
</body>
</html>
